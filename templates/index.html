<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Conversations</title>
<style>
  :root {
    --bg: #faf9f7; --panel: #ffffff; --border: #e6e2db; --ink: #2b2a27;
    --muted: #8a857c; --accent: #b8552a; --accent-soft: #f3e6dd;
    --human: #f0ede8; --assistant: #ffffff; --mark: #ffe7a8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink); background: var(--bg); height: 100vh; overflow: hidden;
  }
  .app { display: grid; grid-template-columns: 360px 1fr; grid-template-rows: 100vh; height: 100vh; }
  .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--panel); min-width: 0; min-height: 0; overflow: hidden; }
  .sidebar header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  .sidebar h1 { margin: 0 0 2px; font-size: 15px; font-weight: 650; }
  .stats { font-size: 12px; color: var(--muted); }
  .searchbar { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .searchbar input {
    width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; background: var(--bg); outline: none;
  }
  .searchbar input:focus { border-color: var(--accent); background: #fff; }
  .toolbar { display: flex; gap: 6px; align-items: center; padding: 8px 12px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); }
  .toolbar select { font-size: 12px; padding: 2px 4px; border: 1px solid var(--border); border-radius: 6px; background: #fff; }
  .list { overflow-y: auto; flex: 1; min-height: 0; }
  .item { padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .item:hover { background: var(--bg); }
  .item.active { background: var(--accent-soft); }
  .item .title { font-weight: 600; font-size: 13px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item .meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }
  .item .snip { font-size: 12px; color: #6b6660; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .item .snip mark { background: var(--mark); padding: 0 1px; border-radius: 2px; }
  .badge { background: var(--accent); color: #fff; border-radius: 10px; padding: 0 6px; font-size: 10px; font-weight: 600; }

  .main { overflow-y: auto; padding: 0; min-width: 0; min-height: 0; }
  .main-inner { max-width: 820px; margin: 0 auto; padding: 28px 32px 80px; }
  .empty { color: var(--muted); text-align: center; margin-top: 22vh; font-size: 14px; }
  .conv-head { margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .conv-head h2 { margin: 0 0 4px; font-size: 21px; }
  .conv-head .meta { color: var(--muted); font-size: 12px; }
  .branch-flag { display: inline-block; margin-left: 8px; color: var(--accent); font-weight: 600; }

  /* Chat bubbles: human right, assistant left (texting-app style). */
  .row { display: flex; margin: 14px 0; }
  .row.human { justify-content: flex-end; }
  .row.assistant { justify-content: flex-start; }
  .bubble { max-width: 78%; min-width: 0; padding: 10px 15px; border-radius: 16px; border: 1px solid var(--border); }
  .row.human .bubble { background: var(--accent-soft); border-color: #e8cdba; border-bottom-right-radius: 5px; }
  .row.assistant .bubble { background: #fff; border-bottom-left-radius: 5px; }
  .bubble .who { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-bottom: 5px; display: flex; gap: 8px; align-items: baseline; }
  .row.human .bubble .who { justify-content: flex-end; }
  .bubble .who .ts { font-weight: 400; letter-spacing: 0; text-transform: none; }
  mark { background: var(--mark); padding: 0 1px; border-radius: 2px; }

  /* Rendered markdown */
  .md { overflow-wrap: anywhere; }
  .md > *:first-child { margin-top: 0; }
  .md > *:last-child { margin-bottom: 0; }
  .md p { margin: 0 0 10px; }
  .md h1, .md h2, .md h3, .md h4 { margin: 14px 0 8px; line-height: 1.25; }
  .md h1 { font-size: 1.3em; } .md h2 { font-size: 1.16em; } .md h3 { font-size: 1.05em; } .md h4 { font-size: 1em; }
  .md ul, .md ol { margin: 0 0 10px; padding-left: 22px; }
  .md li { margin: 2px 0; }
  .md li > p { margin: 0; }
  .md code { background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 4px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em; }
  .md pre { background: #1e1e22; color: #e8e8ea; padding: 12px 14px; border-radius: 9px; overflow-x: auto; margin: 0 0 10px; }
  .md pre code { background: none; padding: 0; color: inherit; font-size: .85em; line-height: 1.5; }
  .md blockquote { margin: 0 0 10px; padding: 2px 0 2px 12px; border-left: 3px solid var(--border); color: var(--muted); }
  .md table { border-collapse: collapse; margin: 0 0 10px; font-size: .9em; display: block; overflow-x: auto; }
  .md th, .md td { border: 1px solid var(--border); padding: 4px 9px; text-align: left; }
  .md th { background: var(--bg); }
  .md a { color: var(--accent); }
  .md img { max-width: 100%; border-radius: 6px; }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .muted { color: var(--muted); }
  .children { margin-left: 20px; border-left: 2px solid var(--accent-soft); padding-left: 14px; margin-top: 8px; }
  .branch-label { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .04em; margin: 4px 0; }
  .chip { display: inline-block; font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 1px 7px; color: var(--muted); margin-right: 6px; }
  details.think, details.tool { margin: 6px 0 0; }
  details.think summary, details.tool summary { cursor: pointer; font-size: 12px; color: var(--muted); }
  details.think .think-body { margin-top: 6px; padding: 10px 12px; background: var(--bg); border-radius: 8px; font-size: 13px; color: #555; }
  .loading { color: var(--muted); text-align: center; margin-top: 22vh; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <header>
      <h1>Conversations</h1>
      <div class="stats" id="stats">Loading…</div>
    </header>
    <div class="searchbar">
      <input id="q" type="search" placeholder="Search all messages…" autocomplete="off" />
    </div>
    <div class="toolbar">
      <span id="count"></span>
      <span style="margin-left:auto">sort
        <select id="sort">
          <option value="updated">recent</option>
          <option value="created">oldest first</option>
          <option value="name">title</option>
        </select>
      </span>
    </div>
    <div class="list" id="list"></div>
  </aside>
  <main class="main">
    <div class="main-inner" id="view">
      <div class="empty">Select a conversation, or search to begin.</div>
    </div>
  </main>
</div>

<script src="/static/marked.min.js"></script>
<script src="/static/purify.min.js"></script>
<script>
const el = (id) => document.getElementById(id);
let activeUuid = null;
let searchMode = false;

function esc(s) {
  return (s || "").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
}
function fmtDate(s) {
  if (!s) return "";
  const d = new Date(s);
  return d.toLocaleDateString(undefined, {year:"numeric", month:"short", day:"numeric"});
}
function fmtTime(s) {
  if (!s) return "";
  return new Date(s).toLocaleString(undefined, {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"});
}
// Render a search snippet: escape, then convert <<< >>> markers to <mark>.
function snippet(s) {
  return esc(s).replace(/&lt;&lt;&lt;/g, "<mark>").replace(/&gt;&gt;&gt;/g, "</mark>");
}

async function loadStats() {
  const s = await (await fetch("/api/stats")).json();
  el("stats").textContent =
    `${s.conversations} conversations · ${s.messages} messages · ${fmtDate(s.earliest)} – ${fmtDate(s.latest)}`;
}

function renderList(items, asSearch) {
  searchMode = asSearch;
  el("count").textContent = asSearch
    ? `${items.length} match${items.length === 1 ? "" : "es"}`
    : `${items.length} conversations`;
  const list = el("list");
  if (!items.length) {
    list.innerHTML = `<div class="empty" style="margin-top:40px">No matches.</div>`;
    return;
  }
  list.innerHTML = items.map(c => `
    <div class="item ${c.uuid === activeUuid ? "active" : ""}" data-uuid="${c.uuid}">
      <div class="title">${esc(c.name)}</div>
      <div class="meta">
        <span>${fmtDate(c.updated_at)}</span>
        <span>${c.message_count} msg</span>
        ${asSearch ? `<span class="badge">${c.hits} hit${c.hits === 1 ? "" : "s"}</span>` : ""}
      </div>
      ${asSearch && c.snippet ? `<div class="snip">${snippet(c.snippet)}</div>` : ""}
    </div>`).join("");
  list.querySelectorAll(".item").forEach(d =>
    d.addEventListener("click", () => openConversation(d.dataset.uuid)));
}

async function loadConversations() {
  const sort = el("sort").value;
  const items = await (await fetch("/api/conversations?sort=" + sort)).json();
  renderList(items, false);
}

let searchTimer = null;
function onSearch() {
  const q = el("q").value.trim();
  clearTimeout(searchTimer);
  if (!q) { loadConversations(); return; }
  searchTimer = setTimeout(async () => {
    const data = await (await fetch("/api/search?q=" + encodeURIComponent(q))).json();
    renderList(data.conversations, true);
  }, 180);
}

// Markdown -> sanitized HTML. breaks:true keeps chat-style single newlines.
marked.setOptions({ gfm: true, breaks: true });
function mdToHtml(text) {
  return DOMPurify.sanitize(marked.parse(text || ""));
}

// Highlight search terms in place after markdown is in the DOM, walking text
// nodes so we never split or corrupt the generated HTML tags.
function highlightDom(root, terms) {
  const parts = terms
    .filter(t => t.length >= 2)
    .map(t => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
  if (!parts.length) return;
  const re = new RegExp("(" + parts.join("|") + ")", "gi");
  const skip = new Set(["SCRIPT", "STYLE", "MARK", "CODE", "PRE"]);
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n) {
      if (!n.nodeValue.trim() || skip.has(n.parentNode.nodeName))
        return NodeFilter.FILTER_REJECT;
      re.lastIndex = 0;
      return re.test(n.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    },
  });
  const targets = [];
  let n;
  while ((n = walker.nextNode())) targets.push(n);
  for (const node of targets) {
    const span = document.createElement("span");
    re.lastIndex = 0;
    span.innerHTML = esc(node.nodeValue).replace(re, "<mark>$1</mark>");
    node.parentNode.replaceChild(span, node);
  }
}

// Render a single message bubble (no children).
function renderBubble(node) {
  const who = node.sender === "human" ? "You" : "Claude";
  const cls = node.sender === "human" ? "human" : "assistant";
  let extras = "";
  if (node.attachments)
    extras += `<div style="margin-bottom:6px">${node.attachments.split(", ").map(a => `<span class="chip">📎 ${esc(a)}</span>`).join("")}</div>`;
  let thinking = "";
  if (node.thinking)
    thinking = `<details class="think"><summary>💭 thinking</summary><div class="think-body md">${mdToHtml(node.thinking)}</div></details>`;
  let tools = "";
  if (node.tools)
    tools = `<div style="margin-top:6px">${node.tools.split(", ").map(t => `<span class="chip">🔧 ${esc(t)}</span>`).join("")}</div>`;
  const body = node.body
    ? `<div class="md">${mdToHtml(node.body)}</div>`
    : `<div class="md muted">(no text content)</div>`;
  return `
    <div class="row ${cls}">
      <div class="bubble">
        <div class="who">${who}<span class="ts">${fmtTime(node.created_at)}</span></div>
        ${extras}${body}${thinking}${tools}
      </div>
    </div>`;
}

// Walk the reply tree. Linear chains (single child) render flat; only true
// branch points (2+ children) indent each branch under a "children" rail.
function renderNode(node) {
  let html = renderBubble(node);
  let cur = node;
  while (cur.children && cur.children.length === 1) {
    cur = cur.children[0];
    html += renderBubble(cur);
  }
  if (cur.children && cur.children.length > 1) {
    html += cur.children
      .map((c, i) => `<div class="children"><div class="branch-label">branch ${i + 1}</div>${renderNode(c)}</div>`)
      .join("");
  }
  return html;
}

async function openConversation(uuid) {
  activeUuid = uuid;
  document.querySelectorAll(".item").forEach(d =>
    d.classList.toggle("active", d.dataset.uuid === uuid));
  el("view").innerHTML = `<div class="loading">Loading…</div>`;
  const data = await (await fetch("/api/conversation/" + uuid)).json();
  const c = data.conversation;
  const terms = el("q").value.trim() ? el("q").value.trim().split(/\s+/) : [];
  el("view").innerHTML = `
    <div class="conv-head">
      <h2>${esc(c.name)}</h2>
      <div class="meta">
        ${fmtDate(c.created_at)} → ${fmtDate(c.updated_at)} · ${c.message_count} messages
        ${data.branched ? `<span class="branch-flag">⑂ branched thread</span>` : ""}
      </div>
    </div>
    ${data.thread.map(n => renderNode(n)).join("")}`;
  if (terms.length) highlightDom(el("view"), terms);
  el("view").parentElement.scrollTop = 0;
  syncUrl();
}

// Reflect the open conversation + query in the URL for shareable deep links.
function syncUrl() {
  const p = new URLSearchParams();
  if (el("q").value.trim()) p.set("q", el("q").value.trim());
  if (activeUuid) p.set("open", activeUuid);
  const qs = p.toString();
  history.replaceState(null, "", qs ? "?" + qs : location.pathname);
}

el("q").addEventListener("input", () => { onSearch(); syncUrl(); });
el("sort").addEventListener("change", () => { if (!el("q").value.trim()) loadConversations(); });
loadStats();

// Honor ?q= and ?open= on load.
(async () => {
  const params = new URLSearchParams(location.search);
  const q = params.get("q");
  const open = params.get("open");
  if (q) {
    el("q").value = q;
    const data = await (await fetch("/api/search?q=" + encodeURIComponent(q))).json();
    renderList(data.conversations, true);
  } else {
    await loadConversations();
  }
  if (open) openConversation(open);
})();
</script>
</body>
</html>
